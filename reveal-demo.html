<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reveal Demo — By_KoZ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;600;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #030303;
    color: #fff;
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 60px 20px;
    overflow-x: hidden;
  }

  .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .5em;
    color: rgba(255,255,255,.3);
  }

  /* ── Фото контейнер ── */
  .photo-wrap {
    position: relative;
    width: min(340px, 90vw);
    aspect-ratio: 3/4;
    border-radius: 3rem;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 0 60px rgba(129,140,248,.08);
    animation: pre-pulse 3s ease-in-out infinite;
  }

  @keyframes pre-pulse {
    0%,100% { box-shadow: 0 0 30px rgba(129,140,248,.06); }
    50%      { box-shadow: 0 0 80px rgba(129,140,248,.2); }
  }

  /* Фото — спочатку ч/б темне */
  .photo-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(1) brightness(.35);
    transition: filter 2.4s ease 1s;
    display: block;
  }

  /* Темний overlay */
  .overlay-grain {
    position: absolute; inset: 0;
    background: linear-gradient(160deg, rgba(0,0,0,.9) 0%, rgba(0,0,0,.4) 60%, transparent 100%);
    z-index: 20;
    transition: opacity 1.4s ease .8s;
    pointer-events: none;
  }

  /* Чорна маска */
  .overlay-mask {
    position: absolute; inset: 0;
    background: #030303;
    z-index: 30;
    transform-origin: top;
    transition: transform 1.8s cubic-bezier(0.76, 0, 0.24, 1) .1s,
                opacity .3s ease 1.9s;
    pointer-events: none;
  }

  /* Scanline */
  .scanline {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #818cf8, transparent);
    box-shadow: 0 0 20px #818cf8, 0 0 50px #818cf8;
    z-index: 40;
    opacity: 0;
    transition: top 1.8s cubic-bezier(0.76, 0, 0.24, 1) .1s;
    pointer-events: none;
  }

  /* ── REVEALED ── */
  .revealed .overlay-mask {
    transform: scaleY(0);
    opacity: 0;
  }
  .revealed .overlay-grain {
    opacity: 0;
  }
  .revealed .scanline {
    top: 100%;
    opacity: 1;
  }
  .revealed img {
    filter: grayscale(0) brightness(1);
    animation: none;
  }
  .revealed {
    animation: none;
    box-shadow: 0 0 70px rgba(129,140,248,.25) !important;
  }

  /* ── Кнопка ── */
  .btn {
    padding: 18px 48px;
    border: 1px solid rgba(129,140,248,.4);
    border-radius: 999px;
    background: transparent;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4em;
    cursor: pointer;
    transition: all .4s;
  }
  .btn:hover {
    background: #818cf8;
    border-color: #818cf8;
  }

  /* ── Текст під фото ── */
  .artist-name {
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 800;
    letter-spacing: -.04em;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1s ease 1.4s, transform 1s ease 1.4s;
    text-align: center;
  }
  .artist-sub {
    font-size: 11px;
    color: #818cf8;
    text-transform: uppercase;
    letter-spacing: .5em;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .8s ease 1.8s, transform .8s ease 1.8s;
    text-align: center;
  }
  .revealed ~ .artist-name,
  .revealed ~ * .artist-name { opacity: 1; transform: none; }

  .texts { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .texts .line1 {
    opacity: 0; transform: translateY(16px);
    transition: opacity .8s ease 1.4s, transform .8s ease 1.4s;
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -.04em;
  }
  .texts .line2 {
    opacity: 0; transform: translateY(12px);
    transition: opacity .8s ease 1.8s, transform .8s ease 1.8s;
    font-size: 11px; color: #818cf8;
    text-transform: uppercase; letter-spacing: .5em;
  }
  .container.go .texts .line1,
  .container.go .texts .line2 { opacity: 1; transform: translateY(0); }

  .container { display: flex; flex-direction: column; align-items: center; gap: 24px; }
</style>
</head>
<body>

  <p class="label">↓ Натисни кнопку щоб побачити ефект ↓</p>

  <div class="container" id="container">
    <div class="photo-wrap" id="photoWrap">
      <!-- Scanline -->
      <div class="scanline" id="scanline"></div>
      <!-- Grain -->
      <div class="overlay-grain" id="grain"></div>
      <!-- Mask -->
      <div class="overlay-mask" id="mask"></div>

      <!-- Фото художника — тут використовуємо завантажений файл -->
      <img src="/mnt/user-data/uploads/5337290957944648462.jpg"
           onerror="this.src='https://images.unsplash.com/photo-1561998338-13ad7883b20f?w=600&q=80'"
           alt="KoZ">
    </div>

    <div class="texts">
      <div class="line1">KoZ</div>
      <div class="line2">Майстер текстур · 8+ років</div>
    </div>
  </div>

  <button class="btn" id="btn" onclick="triggerReveal()">✨ Показати художника</button>

  <script>
    let revealed = false;

    function triggerReveal() {
      if (revealed) {
        // Скинути
        const wrap = document.getElementById('photoWrap');
        const cont = document.getElementById('container');
        const btn  = document.getElementById('btn');
        const scan = document.getElementById('scanline');

        wrap.classList.remove('revealed');
        cont.classList.remove('go');
        scan.style.opacity = '0';
        btn.textContent = '✨ Показати художника';
        revealed = false;
        return;
      }

      revealed = true;
      const wrap = document.getElementById('photoWrap');
      const cont = document.getElementById('container');
      const btn  = document.getElementById('btn');
      const scan = document.getElementById('scanline');

      // 1. Спалах scanline
      scan.style.opacity = '1';

      // 2. Запуск reveal
      setTimeout(() => {
        wrap.classList.add('revealed');
        cont.classList.add('go');
      }, 80);

      btn.textContent = '↺ Скинути';
    }
  </script>
</body>
</html>
